name: Swift 6 Build
on: [push, pull_request]

jobs:
  build-and-test:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS: full build + all tests (includes SwiftAvroRpc with Apple Compression codecs)
          - os: macos-latest
            test-args: ""
          # Linux: full build + Core tests only (Apple Compression framework unavailable)
          - os: ubuntu-latest
            test-args: "--filter SwiftAvroCoreTests"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift 6
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.1"

      - name: Install OpenSSL (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libssl-dev

      - name: Build
        run: swift build -c release

      - name: Run Tests
        run: swift test ${{ matrix.test-args }}
